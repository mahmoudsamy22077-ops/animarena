name: Build AnimArena Mod

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Generate Gradle wrapper (if missing)
        run: |
          if [ ! -f "./gradlew" ]; then
            wget -q https://services.gradle.org/distributions/gradle-8.8-bin.zip -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp
            /tmp/gradle-8.8/bin/gradle wrapper --gradle-version 8.8
            chmod +x gradlew
          fi

      - name: Build mod
        run: ./gradlew build --no-daemon

      - name: Upload built mod jar
        uses: actions/upload-artifact@v4
        with:
          name: animarena-mod-jar
          path: build/libs/*.jar     
